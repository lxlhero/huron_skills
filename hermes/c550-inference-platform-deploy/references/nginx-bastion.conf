# C550 推理平台跳板机 nginx 配置
# 部署位置：ecs-liangxiuliang (10.120.17.201) /etc/nginx/sites-enabled/default
# 公网入口：10.140.158.130:8881 → DNAT → 本机 88 端口
#
# 重要：跳板机在 Pod 子网 10.120.x.x，只能访问 Pod IP，不能访问 Service ClusterIP 或 Node IP
# 所有 proxy_pass 必须使用 Pod IP 硬编码

server {
    listen 88;
    server_name _;
    client_max_body_size 100m;
    proxy_read_timeout 600s;

    # --- 管理 API：通配所有 /api/v1/* → inference-manager Pod ---
    # 丢弃客户端 query string，硬编码 namespace=vc-c550-jiaofu-test
    # 原因：admin 用户无 project，代码默认 namespace="default" 查不到数据
    location /api/v1/ {
        proxy_pass http://10.120.16.210:8080$uri?namespace=vc-c550-jiaofu-test;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;
        proxy_buffering off;
    }

    # --- 模型推理网关 ---
    location /model/ {
        proxy_pass http://10.120.20.251/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_pass_request_headers on;
        proxy_read_timeout 600s;
    }

    # --- SPA 静态资源 ---
    location /assets/ {
        proxy_pass http://10.120.17.45/assets/;
        proxy_set_header Host $host;
        expires 30d;
    }
    location /vite.svg {
        proxy_pass http://10.120.17.45/vite.svg;
        proxy_set_header Host $host;
    }

    # --- 健康检查 ---
    location /healthz {
        proxy_pass http://10.120.16.210:8080/healthz;
        proxy_set_header Host $host;
    }

    # --- SPA 回退（必须放最后） ---
    location / {
        proxy_pass http://10.120.17.45;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}

# === IP 对应关系 ===
# 10.120.16.210:8080 → inference-manager Pod
# 10.120.17.45      → inference-manager-ui Pod (SPA)
# 10.120.20.251     → nginx-proxy Pod (模型推理代理)
#
# === 注意事项 ===
# 1. Pod IP 重启会变，需同步更新此文件
# 2. 不要用 nginx 变量（如 set $manager ...），否则需要 resolver 才能 proxy_pass
# 3. 不要尝试 proxy_pass 到 Service ClusterIP（10.100.x.x）或 Node IP（10.12.x.x）——跳板机不可达
# 4. /api/v1/ 必须是 prefix match（不是 exact match），否则前端调用的 /model-instances 等子路径不匹配
# 5. location / 必须放最后，否则会吞掉其他 location 的请求
